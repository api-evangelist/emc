aid: emc
name: EMC
description: >-
  EMC Corporation (now Dell EMC, a division of Dell Technologies) provides
  enterprise storage, data management, and cloud infrastructure solutions. EMC
  products include VMAX, VNX, Isilon, and ECS storage platforms, as well as
  data protection and information management solutions. EMC was acquired by
  Dell Technologies in 2016.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: >-
  https://raw.githubusercontent.com/api-evangelist/emc/refs/heads/main/apis.yml
created: '2026-03-24'
modified: '2026-04-18'
specificationVersion: '0.19'
tags:
